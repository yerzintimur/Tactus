name: Tactus
# Xcode project is GENERATED from this spec by XcodeGen — never hand-edit the
# .xcodeproj (it is git-ignored, like bindings/). Regenerate with `just ios-gen`.
options:
  bundleIdPrefix: app.tactus
  deploymentTarget:
    iOS: "18.0"
    macOS: "14.0"
  createIntermediateGroups: true

# The shared Rust core, packaged as a local Swift package by `just build-ios`.
# Run that first so bindings/Tactus exists before generating/opening the project.
packages:
  Tactus:
    path: ../../bindings/Tactus

targets:
  # App module is "TactusApp" (not "Tactus") so `import Tactus` pulls in the core
  # package module without colliding with the app's own module.
  # Single multiplatform app: iPhone, iPad, and Mac from one target/codebase.
  TactusApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: TactusApp
    dependencies:
      - package: Tactus
        product: Tactus
    settings:
      base:
        # Product/module stay "TactusApp" (the target name) so they don't collide
        # with the core package's "Tactus" module and TEST_HOST resolves. The
        # user-facing name is "Tactus" via CFBundleDisplayName below.
        PRODUCT_BUNDLE_IDENTIFIER: app.tactus.app
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # arm64 only (matches the core XCFramework, which has no Intel slices):
        # build the iOS Simulator and the Mac for arm64 on Apple Silicon hosts.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        "EXCLUDED_ARCHS[sdk=macosx*]": x86_64
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Tactus
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"

  TactusAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TactusAppTests
    dependencies:
      - target: TactusApp
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

  TactusAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TactusAppUITests
    dependencies:
      - target: TactusApp
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

schemes:
  TactusApp:
    build:
      targets:
        TactusApp: all
        TactusAppTests: [test]
        TactusAppUITests: [test]
    test:
      targets:
        - TactusAppTests
        - TactusAppUITests
    run:
      config: Debug
