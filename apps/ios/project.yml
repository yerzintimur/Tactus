name: Tactus
# Xcode project is GENERATED from this spec by XcodeGen — never hand-edit the
# .xcodeproj (it is git-ignored, like bindings/). Regenerate with `just ios-gen`.
options:
  bundleIdPrefix: app.tactus
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

# The shared Rust core, packaged as a local Swift package by `just build-ios`.
# Run that first so bindings/Tactus exists before generating/opening the project.
packages:
  Tactus:
    path: ../../bindings/Tactus

targets:
  # App module is "TactusApp" (not "Tactus") so `import Tactus` pulls in the core
  # package module without colliding with the app's own module.
  TactusApp:
    type: application
    platform: iOS
    sources:
      - path: TactusApp
    dependencies:
      - package: Tactus
        product: Tactus
    settings:
      base:
        PRODUCT_NAME: Tactus
        # Keep the app's Swift module distinct from the core package's "Tactus"
        # module, else both emit a colliding Tactus.swiftmodule.
        PRODUCT_MODULE_NAME: TactusApp
        PRODUCT_BUNDLE_IDENTIFIER: app.tactus.app
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # We ship arm64 only; the core XCFramework has no Intel-simulator slice,
        # so build the simulator for arm64 (Apple Silicon hosts) only.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Tactus
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
