# Continuous integration for Tactus.
#
# New to GitHub Actions? Read docs/CI.md — it explains the concepts and walks
# through this exact file. The golden rule: CI runs the SAME `just` recipes you
# run locally, so the justfile stays the single source of truth and any CI
# failure is reproducible on your machine with the same command.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # the manual "Run workflow" button in the Actions tab

concurrency:
  # A new push to the same branch cancels the still-running CI for the old one.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Rust core (pinned Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      # Cargo's registry and the build dir live under .docker/ (see
      # scripts/cargo-docker.sh), so caching that one directory turns a cold
      # ~10 min build into a warm ~3 min one.
      - name: Cache cargo home + build dir
        uses: actions/cache@v4
        with:
          path: .docker
          key: core-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'docker/Dockerfile') }}
          restore-keys: core-

      # Identical commands, identical pinned image as local dev; the script
      # builds the Docker image on first use.
      - name: Format check + lint + tests
        run: just test-core

      - name: End-to-end tests (virtual device + cassette replay)
        run: just test-e2e

  apple:
    name: Apple app (bindings + simulator tests)
    # Pinned (not macos-latest) so the Xcode major matches local dev and runs
    # stay reproducible while GitHub migrates the -latest label.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      # rustup reads rust-toolchain.toml and fetches the pinned toolchain on
      # first use; this also covers the two iOS cross-compilation targets.
      - name: Show toolchains, install Rust iOS targets
        run: |
          sw_vers
          xcodebuild -version
          rustup show
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Cache cargo home + build dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: apple-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: apple-

      - name: Install cargo-swift
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-swift@0.11

      - name: Install just + XcodeGen
        run: brew install just xcodegen

      - name: Build the core bindings (XCFramework + Swift package)
        run: just build-ios

      - name: Generate the Xcode project
        run: just ios-gen

      # Runner images ship different simulator sets per Xcode version, so pick
      # the newest available iPhone (by udid — names can repeat across runtime
      # versions) instead of hardcoding a model name. Since Xcode 15 the iOS
      # simulator runtime is a separate download and fresh runner images
      # occasionally lack it — download it as a fallback, and fail THIS step
      # loudly rather than hand xcodebuild a bogus destination.
      - name: Pick a simulator
        id: sim
        run: |
          pick() {
            xcrun simctl list -j devices available | jq -r '
              .devices
              | to_entries
              | map(select(.key | test("SimRuntime\\.iOS")))
              | sort_by(.key)
              | (last.value // [])
              | map(select(.name | startswith("iPhone")))
              | first
              | if . == null then "" else "\(.udid)\t\(.name)" end'
          }
          picked="$(pick)"
          if [ -z "$picked" ]; then
            echo "No iOS simulator available — downloading the iOS platform…"
            sudo xcodebuild -downloadPlatform iOS
            picked="$(pick)"
          fi
          xcrun simctl list devices available || true
          if [ -z "$picked" ]; then
            echo "::error::No iPhone simulator available on this runner"
            exit 1
          fi
          udid="${picked%%$'\t'*}"
          name="${picked#*$'\t'}"
          echo "Using simulator: $name ($udid)"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      # Booting up front (instead of letting xcodebuild race a cold boot) is
      # the classic stabiliser for simulator tests on shared CI machines.
      - name: Pre-boot the simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Unit + UI tests (incl. the accessibility audit)
        id: tests
        run: |
          set -o pipefail
          just ios-test-dest "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" 2>&1 | tee xcodebuild.log

      # Reading logs on github.com requires signing in, so on failure surface
      # the interesting lines as annotations (visible on the run page without
      # auth) and attach the full log as an artifact.
      - name: Surface the failure
        if: failure() && steps.tests.outcome == 'failure'
        run: |
          { grep -E "error:|error =|xcodebuild: error|Testing failed|Fatal error|failed to|Ineligible destinations" xcodebuild.log | tail -n 10; tail -n 5 xcodebuild.log; } \
            | while IFS= read -r l; do echo "::error::${l:0:400}"; done
          true

      - name: Upload the xcodebuild log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
